<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 生图工作台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=merge-1" />
  </head>
  <body>
    <div class="theme-matrix-bg" id="themeMatrixBg" aria-hidden="true"></div>
    <header class="topbar">
      <div class="topbar-left">
        <a class="back-link" href="/" title="返回功能大厅">← 返回</a>
        <strong>AI 生图工作台</strong>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" id="themeToggleBtn" type="button" aria-label="切换到深色主题" title="切换到深色主题">
          <span class="theme-toggle-face theme-toggle-face-light" data-set-theme="light" role="button" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="theme-toggle-icon" focusable="false" aria-hidden="true">
              <circle cx="12" cy="12" r="5" fill="currentColor"></circle>
              <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M12 1v3"></path>
                <path d="M12 20v3"></path>
                <path d="M1 12h3"></path>
                <path d="M20 12h3"></path>
                <path d="M4.22 4.22l2.12 2.12"></path>
                <path d="M17.66 17.66l2.12 2.12"></path>
                <path d="M4.22 19.78l2.12-2.12"></path>
                <path d="M17.66 6.34l2.12-2.12"></path>
              </g>
            </svg>
          </span>
          <span class="theme-toggle-face theme-toggle-face-dark" data-set-theme="dark" role="button" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="theme-toggle-icon" focusable="false" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"></path>
            </svg>
          </span>
          <span class="theme-toggle-face theme-toggle-face-cyberpunk" data-set-theme="cyberpunk" role="button" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="theme-toggle-icon" focusable="false" aria-hidden="true">
              <rect x="10" y="1" width="4" height="4" rx="1" fill="currentColor" opacity="0.8"></rect>
              <path d="M12 5 L12 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
              <rect x="5" y="7" width="14" height="13" rx="3" stroke="currentColor" stroke-width="1.6" fill="none"></rect>
              <circle cx="9" cy="13" r="1.8" fill="currentColor"></circle>
              <circle cx="15" cy="13" r="1.8" fill="currentColor"></circle>
              <path d="M9 17.5 L15 17.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path>
            </svg>
          </span>
          <span class="theme-toggle-face theme-toggle-face-matrix" data-set-theme="matrix" role="button" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="theme-toggle-icon" focusable="false" aria-hidden="true">
              <path d="M3.5 9.5c0-1.1.9-2 2-2h3.4c.5 0 1 .18 1.4.5l1 1h1.2l1-1c.38-.32.88-.5 1.38-.5h3.6c1.1 0 2 .9 2 2v3c0 1.1-.9 2-2 2h-3.32c-.55 0-1.08-.22-1.46-.61l-1.02-1.03h-1.18l-1.02 1.03c-.38.39-.91.61-1.46.61H5.5c-1.1 0-2-.9-2-2v-3Z" fill="currentColor"></path>
              <circle cx="8" cy="11" r="2.1" fill="#050705"></circle>
              <circle cx="16" cy="11" r="2.1" fill="#050705"></circle>
              <path d="M1.8 10.2h2.1m16.2 0h2.1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
            </svg>
          </span>
        </button>
        <a class="nav-link" href="/">功能大厅</a>
        <button class="primary compact" id="topbarLoginBtn">登录</button>
        <button class="icon-button hidden" id="settingsBtn" title="管理员配置" aria-label="管理员配置">⚙</button>
      </div>
    </header>

    <div class="login-banner hidden" id="loginBanner">
      <span>登录后即可使用全部功能</span>
      <button class="primary" id="bannerLoginBtn">立即登录</button>
    </div>

    <main class="workspace">
      <section class="generator">
        <div class="section-title stack">
          <h2>Prompt 生成</h2>
          <span>选择 LLM 模型与任务模式，模型会按规则输出可直接用于生图的 Prompt。</span>
        </div>

        <div class="left-params">
          <label class="field">
            <span>LLM 模型</span>
            <select id="llmModelSelect"></select>
          </label>

          <div class="switch-block stack">
            <span class="switch-label">任务模式</span>
            <div class="segmented-switch task-mode-switch" id="taskModeSwitch">
              <button id="editTaskBtn" class="switch-btn is-active" type="button" data-mode="edit">改图</button>
              <button id="referenceTaskBtn" class="switch-btn" type="button" data-mode="reference">参考图生图</button>
              <button id="textTaskBtn" class="switch-btn" type="button" data-mode="text">纯文生图</button>
            </div>
          </div>
        </div>

        <div class="reference-field">
          <div class="reference-head">
            <span>参考图</span>
            <button id="clearReferencesBtn" class="compact" type="button" disabled>清空参考图</button>
          </div>
          <label class="upload-zone" id="uploadZone">
            <input id="referenceInput" type="file" accept="image/*" multiple />
            <strong>选择或拖入参考图</strong>
            <em class="upload-note" id="referenceNote">改图模式下，请先上传至少一张原图。</em>
          </label>
          <div class="reference-thumbs" id="referenceThumbs"></div>
        </div>

        <label class="field">
          <span>需求描述</span>
          <textarea id="descriptionInput" rows="5" placeholder="仅需描述需求，大语言模型会补充提示词"></textarea>
        </label>

        <div class="optimizer-actions">
          <button id="optimizePromptBtn" class="primary compact" type="button">调用模型优化 Prompt</button>
          <button id="clearOptimizerBtn" class="compact" type="button">清空</button>
        </div>

        <p class="status" id="optimizeStatus"></p>

        <div class="prompt-field">
          <div class="prompt-head">
            <span>Prompt</span>
            <div class="segmented-switch slider-switch compact-switch" id="promptFormatSwitch" hidden>
              <span class="switch-track" aria-hidden="true"></span>
              <span class="switch-thumb" aria-hidden="true"></span>
              <span class="switch-shadow" aria-hidden="true"></span>
              <button id="plainPromptBtn" class="switch-btn is-active" type="button" data-format="plain">Prompt</button>
              <button id="jsonPromptBtn" class="switch-btn" type="button" data-format="json">JSON</button>
            </div>
          </div>
          <textarea id="promptInput" rows="8" placeholder="点击「调用模型优化 Prompt」后，结果会自动填入这里；也可手动编辑。"></textarea>
        </div>
      </section>

      <section class="output">
        <div class="section-title">
          <h2>图片输出</h2>
          <span id="modelHint">等待选择模型</span>
        </div>

        <div class="control-grid right-controls">
          <label>
            生图模型
            <select id="modelSelect"></select>
          </label>
          <label>
            图片比例
            <select id="aspectSelect">
              <option value="1:1 正方形构图">1:1</option>
              <option value="16:9 横向宽银幕构图" selected>横向 16:9</option>
              <option value="4:3 横向经典构图">横向 4:3</option>
              <option value="9:16 竖向手机海报构图">竖向 16:9</option>
              <option value="3:4 竖向经典构图">竖向 4:3</option>
            </select>
          </label>
          <label>
            图片张数
            <select id="countSelect">
              <option>1</option>
              <option>2</option>
              <option>3</option>
              <option>4</option>
              <option>5</option>
              <option>6</option>
              <option>7</option>
              <option>8</option>
              <option>9</option>
            </select>
          </label>
          <label>
            Quality
            <select id="qualitySelect">
              <option value="high" selected>high</option>
              <option value="low">low</option>
            </select>
          </label>
          <div class="inline-action">
            <button id="generateBtn" class="primary" type="button">生成图片</button>
          </div>
        </div>

        <p class="status" id="statusText"></p>

        <div class="output-actions">
          <button id="downloadAllBtn" class="compact" type="button" disabled>全部下载</button>
        </div>
        <div class="image-box" id="imageBox">
          <div class="placeholder">生成结果会显示在这里</div>
        </div>
      </section>

      <section class="side-records">
        <div class="section-title">
          <h2>本机记录</h2>
          <div class="side-record-actions">
            <button id="refreshUserRecordsBtn" class="compact" type="button">刷新</button>
          </div>
        </div>
        <div id="userRecordsList" class="records-list user-records-list"></div>
      </section>
    </main>

    <dialog id="adminDialog" class="admin-dialog">
      <div class="dialog-head">
        <h2>管理员配置</h2>
        <button class="icon-button" id="closeAdminBtn" aria-label="关闭">×</button>
      </div>

      <form id="loginForm" class="admin-card">
        <h3>飞书登录</h3>
        <p>登录后可使用 AI 生图工作台；管理员会看到额外管理功能。</p>
        <div class="admin-actions-row">
          <button id="feishuLoginBtn" type="button" class="primary compact">飞书登录</button>
        </div>
        <p class="status" id="loginStatus"></p>
      </form>

      <div id="adminPanel" class="admin-panel hidden">
        <section class="admin-card">
          <div class="card-head">
            <h3>当前账号</h3>
            <button id="adminLogoutBtn" class="compact" type="button">退出登录</button>
          </div>
          <div id="currentAdminInfo" class="status"></div>
        </section>

        <section id="feishuConfigSection" class="admin-card hidden">
          <div class="card-head">
            <h3>飞书登录配置</h3>
          </div>
          <form id="feishuConfigForm">
            <div class="admin-grid">
              <label class="check-row"><input id="feishuEnabled" type="checkbox" checked /> 启用飞书登录</label>
              <label>App ID<input id="feishuAppId" placeholder="cli_xxx" /></label>
              <label>App Secret<input id="feishuAppSecret" type="password" placeholder="保存后会隐藏" /></label>
              <label>回调地址<input id="feishuRedirectUri" placeholder="http://localhost:3000/api/admin/feishu/callback" /></label>
            </div>
            <button type="submit" class="primary compact">保存飞书配置</button>
            <p id="feishuConfigStatus" class="status"></p>
          </form>
        </section>

        <section id="adminUsersSection" class="admin-card hidden">
          <div class="card-head">
            <h3>管理员名单</h3>
          </div>
          <form id="adminUserForm">
            <div class="admin-grid">
              <label>姓名<input id="adminUserName" placeholder="必填，例如：张三" /></label>
            </div>
            <button type="submit" class="primary compact">添加或更新管理员</button>
            <p id="adminUserStatus" class="status"></p>
          </form>
          <div id="adminUsersList" class="api-list"></div>
        </section>

        <div class="admin-card">
          <div class="card-head">
            <h3>生图 API / 模型管理</h3>
            <button id="newApiBtn" class="compact" type="button">新增模型</button>
          </div>
          <div id="apiList" class="api-list"></div>
        </div>

        <form id="apiForm" class="admin-card hidden">
          <h3 id="apiFormTitle">新增模型</h3>
          <input id="apiId" type="hidden" />
          <div class="admin-grid">
            <label>显示名称<input id="apiName" placeholder="例如：Doubao Seedream 5.0" /></label>
            <label>模型 ID<input id="apiModel" placeholder="例如：gpt-image-1" /></label>
            <label>API 地址<input id="apiEndpoint" placeholder="图片生成接口地址" /></label>
            <label>API Key<input id="apiKey" type="password" placeholder="保存后会隐藏" /></label>
            <label>尺寸<input id="apiSize" placeholder="1024x1024" /></label>
            <label>适配器
              <select id="apiProvider">
                <option value="auto">自动</option>
                <option value="generic">通用 JSON</option>
                <option value="openai">OpenAI / GPT Image</option>
                <option value="ark">Ark Seedream</option>
              </select>
            </label>
            <label>Ark 改图模型<input id="apiEditModel" placeholder="doubao-seededit-3-0-i2i-250628" /></label>
            <label class="check-row"><input id="apiUseResponsesImageTool" type="checkbox" /> GPT Image 使用 Responses image_generation 工具</label>
            <label class="mode-multi-field">用于模式
              <div class="mode-multi-box">
                <label class="mode-check"><input id="apiModeGeneration" type="checkbox" checked /> generation 生图</label>
                <label class="mode-check"><input id="apiModeEdit" type="checkbox" /> edit 改图</label>
              </div>
            </label>
          </div>
          <button type="submit" class="primary compact">保存模型</button>
          <p class="status" id="apiStatus"></p>
        </form>

        <div class="admin-card">
          <div class="card-head">
            <h3>LLM API / 模型管理</h3>
            <button id="newLlmApiBtn" class="compact" type="button">新增模型</button>
          </div>
          <div id="llmApiList" class="api-list"></div>
        </div>

        <form id="llmApiForm" class="admin-card hidden">
          <h3 id="llmApiFormTitle">新增 LLM 模型</h3>
          <input id="llmApiId" type="hidden" />
          <div class="admin-grid">
            <label>显示名称<input id="llmApiName" placeholder="例如：GPT-4o / Gemini Vision" /></label>
            <label>模型 ID<input id="llmApiModel" placeholder="例如：gpt-4o / gpt-4.1" /></label>
            <label>API 地址<input id="llmApiEndpoint" placeholder="例如：https://api.openai.com/v1" /></label>
            <label>API Key<input id="llmApiKey" type="password" placeholder="保存后会隐藏" /></label>
            <label>温度<input id="llmApiTemperature" type="number" min="0" max="2" step="0.1" value="0.4" /></label>
            <label class="check-row"><input id="llmApiEnabled" type="checkbox" checked /> 启用</label>
          </div>
          <button type="submit" class="primary compact">保存 LLM 模型</button>
          <p class="status" id="llmApiStatus"></p>
        </form>

        <div class="admin-card">
          <div class="card-head">
            <h3>生成记录</h3>
            <div class="record-actions">
              <button id="refreshRecordsBtn" class="compact" type="button">刷新记录</button>
            </div>
          </div>
          <div id="recordFilters" class="record-filters">
            <label>使用者<select id="filterUser"></select></label>
            <label>开始时间<input id="filterStart" type="datetime-local" /></label>
            <label>结束时间<input id="filterEnd" type="datetime-local" /></label>
            <button id="applyFiltersBtn" class="primary compact" type="button">应用筛选</button>
            <button id="resetFiltersBtn" class="compact" type="button">重置</button>
          </div>
          <div id="recordsList" class="records-list"></div>
        </div>
      </div>
    </dialog>

    <dialog id="previewDialog" class="preview-dialog">
      <div class="dialog-head">
        <h2>预览</h2>
        <button class="icon-button" id="closePreviewBtn" aria-label="关闭">×</button>
      </div>
      <div id="previewGrid" class="preview-grid"></div>
    </dialog>

    <dialog id="loginFailDialog" class="login-fail-dialog">
      <p>登录失败</p>
      <button class="primary" id="closeLoginFailBtn">确定</button>
    </dialog>

    <script src="/app.js?v=merge-1"></script>
  </body>
</html>
