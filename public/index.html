<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>功能大厅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/hall.css" />
  </head>
  <body>
    <div class="theme-matrix-bg" id="themeMatrixBg" aria-hidden="true"></div>
    <button class="theme-toggle-hall" id="themeToggleBtn" type="button" aria-label="切换到深色主题" title="切换到深色主题">
      <span class="hall-face hall-face-light" data-set-theme="light" role="button" aria-hidden="true">
        <svg viewBox="0 0 24 24" class="hall-icon" focusable="false" aria-hidden="true">
          <circle cx="12" cy="12" r="5" fill="currentColor"></circle>
          <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 1v3"></path>
            <path d="M12 20v3"></path>
            <path d="M1 12h3"></path>
            <path d="M20 12h3"></path>
            <path d="M4.22 4.22l2.12 2.12"></path>
            <path d="M17.66 17.66l2.12 2.12"></path>
            <path d="M4.22 19.78l2.12-2.12"></path>
            <path d="M17.66 6.34l2.12-2.12"></path>
          </g>
        </svg>
      </span>
      <span class="hall-face hall-face-dark" data-set-theme="dark" role="button" aria-hidden="true">
        <svg viewBox="0 0 24 24" class="hall-icon" focusable="false" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"></path>
        </svg>
      </span>
      <span class="hall-face hall-face-cyberpunk" data-set-theme="cyberpunk" role="button" aria-hidden="true">
        <svg viewBox="0 0 24 24" class="hall-icon" focusable="false" aria-hidden="true">
          <rect x="10" y="1" width="4" height="4" rx="1" fill="currentColor" opacity="0.8"></rect>
          <path d="M12 5 L12 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
          <rect x="5" y="7" width="14" height="13" rx="3" stroke="currentColor" stroke-width="1.6" fill="none"></rect>
          <circle cx="9" cy="13" r="1.8" fill="currentColor"></circle>
          <circle cx="15" cy="13" r="1.8" fill="currentColor"></circle>
          <path d="M9 17.5 L15 17.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path>
        </svg>
      </span>
      <span class="hall-face hall-face-matrix" data-set-theme="matrix" role="button" aria-hidden="true">
        <svg viewBox="0 0 24 24" class="hall-icon" focusable="false" aria-hidden="true">
          <path d="M3.5 9.5c0-1.1.9-2 2-2h3.4c.5 0 1 .18 1.4.5l1 1h1.2l1-1c.38-.32.88-.5 1.38-.5h3.6c1.1 0 2 .9 2 2v3c0 1.1-.9 2-2 2h-3.32c-.55 0-1.08-.22-1.46-.61l-1.02-1.03h-1.18l-1.02 1.03c-.38.39-.91.61-1.46.61H5.5c-1.1 0-2-.9-2-2v-3Z" fill="currentColor"></path>
          <circle cx="8" cy="11" r="2.1" fill="#050705"></circle>
          <circle cx="16" cy="11" r="2.1" fill="#050705"></circle>
          <path d="M1.8 10.2h2.1m16.2 0h2.1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
        </svg>
      </span>
    </button>
    <main class="hall-shell">
      <div class="login-banner hidden" id="loginBanner">
        <span>登录后即可使用全部功能</span>
        <button class="primary" id="bannerLoginBtn">立即登录</button>
      </div>

      <section class="hall-hero">
        <p class="eyebrow">CREATIVE TOOL HALL</p>
        <h1>功能大厅</h1>
        <p>
          选择要进入的工作流：先把想法整理成规范 Prompt，再进入生图工作台调用模型生成图片。
        </p>
      </section>

      <section class="tool-grid single">
        <a class="tool-card" href="/image.html">
          <span class="tool-mark">IMG</span>
          <div>
            <p class="tool-kicker">IMAGE GENERATION</p>
            <h2>AI 生图工作台</h2>
            <p>填写需求、调用 LLM 优化 Prompt、选择模型与比例，一站式完成生图。</p>
          </div>
          <strong>进入生图</strong>
        </a>
      </section>
    </main>

    <dialog id="loginFailDialog" class="login-fail-dialog">
      <p>登录失败</p>
      <button class="primary" id="closeLoginFailBtn">确定</button>
    </dialog>

    <script>
      (async function () {
        var themeStorageKey = "preferredTheme";
        var matrixPhrases = ["Battle Of Balls · 球球大作战"];

        function ensureMatrixBackground() {
          var bg = document.getElementById("themeMatrixBg");
          if (!bg || bg.dataset.ready === "true") return bg;
          var reducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          var width = Math.max(window.innerWidth || 0, document.documentElement.clientWidth || 0, 1280);
          var columnCount = reducedMotion ? 14 : Math.min(44, Math.max(24, Math.floor(width / 36)));
          var matrixPhrase = "Battle Of Balls · 球球大作战";
          function buildStreamText(minLength, maxLength) {
            var length = Math.floor(minLength + Math.random() * (maxLength - minLength));
            var result = "";
            for (var j = 0; j < length; j += 1) {
              if (j > 0) result += "\n";
              result += matrixPhrase.charAt(j % matrixPhrase.length);
            }
            return result;
          }
          var fragment = document.createDocumentFragment();
          for (var i = 0; i < columnCount; i += 1) {
            var stream = document.createElement("span");
            stream.className = "matrix-stream";
            var layer = i % 5;
            var opacity = reducedMotion ? 0.2 : 0.16 + Math.random() * 0.42;
            var duration = reducedMotion ? 24 : 10 + Math.random() * 9;
            var size = layer === 0 ? 17 : layer === 1 ? 15 : layer === 2 ? 14 : layer === 3 ? 13 : 12;
            var blur = layer === 0 ? 0 : layer === 1 ? 0.15 : layer === 2 ? 0.3 : layer === 3 ? 0.55 : 0.85;
            var left = (i / columnCount) * 100 + (Math.random() * 2.8 - 1.4);
            stream.style.left = left.toFixed(2) + "%";
            stream.style.setProperty("--stream-opacity", opacity.toFixed(2));
            stream.style.setProperty("--stream-scale", (layer === 0 ? 1.14 : layer === 1 ? 1.03 : layer === 2 ? 0.96 : layer === 3 ? 0.9 : 0.84).toFixed(2));
            stream.style.setProperty("--stream-size", size + "px");
            stream.style.setProperty("--stream-blur", blur.toFixed(2) + "px");
            stream.style.setProperty("--stream-glow", layer <= 1 ? "0 0 10px rgba(76, 255, 100, 0.22), 0 0 20px rgba(76, 255, 100, 0.08)" : layer === 2 ? "0 0 8px rgba(76, 255, 100, 0.14)" : "0 0 5px rgba(76, 255, 100, 0.08)");
            stream.style.animationDelay = (Math.random() * -22).toFixed(2) + "s";
            stream.style.animationDuration = duration.toFixed(2) + "s";
            stream.textContent = buildStreamText(layer <= 1 ? 24 : 18, layer <= 1 ? 38 : 30);
            fragment.appendChild(stream);
          }
          bg.appendChild(fragment);
          bg.dataset.ready = "true";
          return bg;
        }

        function disposeMatrixBackground() {
          var bg = document.getElementById("themeMatrixBg");
          if (!bg) return;
          bg.classList.remove("is-active");
          bg.textContent = "";
          delete bg.dataset.ready;
        }

        function applyTheme(theme) {
          document.documentElement.setAttribute("data-theme", theme);
          var btn = document.getElementById("themeToggleBtn");
          if (!btn) return;
          var labels = { light: "浅色主题", dark: "深色主题", cyberpunk: "赛博朋克主题", matrix: "矩阵主题" };
          btn.dataset.theme = theme;
          btn.setAttribute("aria-label", labels[theme] || labels.light);
          btn.setAttribute("title", labels[theme] || labels.light);
          if (theme === "matrix") {
            var bg = ensureMatrixBackground();
            if (bg) bg.classList.add("is-active");
          } else {
            disposeMatrixBackground();
          }
        }

        function getStoredTheme() {
          var stored = localStorage.getItem(themeStorageKey);
          return stored === "dark" || stored === "cyberpunk" || stored === "matrix" ? stored : "light";
        }

        applyTheme(getStoredTheme());
        document.getElementById("themeToggleBtn").addEventListener("click", function (e) {
          var face = e.target.closest("[data-set-theme]");
          if (!face) return;
          var theme = face.dataset.setTheme;
          if (!theme) return;
          localStorage.setItem(themeStorageKey, theme);
          applyTheme(theme);
        });

        try {
          const session = await fetch("/api/admin/session").then(function (r) { return r.json(); });
          if (!session.authed) {
            document.getElementById("loginBanner").classList.remove("hidden");
          }
        } catch (_) {
          document.getElementById("loginBanner").classList.remove("hidden");
        }

        async function beginLogin() {
          try {
            var res = await fetch("/api/admin/feishu/login?returnTo=" + encodeURIComponent("/"));
            var data = await res.json();
            if (!res.ok || !data || !data.url) {
              document.getElementById("loginFailDialog").querySelector("p").textContent = data.error || "登录失败";
              document.getElementById("loginFailDialog").showModal();
              return;
            }
            window.location.href = data.url;
          } catch (_) {
            document.getElementById("loginFailDialog").querySelector("p").textContent = "登录失败";
            document.getElementById("loginFailDialog").showModal();
          }
        }

        document.getElementById("bannerLoginBtn").addEventListener("click", beginLogin);
        document.getElementById("closeLoginFailBtn").addEventListener("click", function () {
          document.getElementById("loginFailDialog").close();
        });
      })();
    </script>
  </body>
</html>
