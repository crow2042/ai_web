<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>功能大厅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/hall.css" />
  </head>
  <body>
    <main class="hall-shell">
      <div class="login-banner hidden" id="loginBanner">
        <span>登录后即可使用全部功能</span>
        <button class="primary" id="bannerLoginBtn">立即登录</button>
      </div>

      <section class="hall-hero">
        <p class="eyebrow">CREATIVE TOOL HALL</p>
        <h1>功能大厅</h1>
        <p>
          选择要进入的工作流：先把想法整理成规范 Prompt，再进入生图工作台调用模型生成图片。
        </p>
      </section>

      <section class="tool-grid single">
        <a class="tool-card" href="/image.html">
          <span class="tool-mark">IMG</span>
          <div>
            <p class="tool-kicker">IMAGE GENERATION</p>
            <h2>AI 生图工作台</h2>
            <p>填写需求、调用 LLM 优化 Prompt、选择模型与比例，一站式完成生图。</p>
          </div>
          <strong>进入生图</strong>
        </a>
      </section>
    </main>

    <dialog id="loginFailDialog" class="login-fail-dialog">
      <p>登录失败</p>
      <button class="primary" id="closeLoginFailBtn">确定</button>
    </dialog>

    <script>
      (async function () {
        try {
          const session = await fetch("/api/admin/session").then(function (r) { return r.json(); });
          if (!session.authed) {
            document.getElementById("loginBanner").classList.remove("hidden");
          }
        } catch (_) {
          document.getElementById("loginBanner").classList.remove("hidden");
        }

        async function beginLogin() {
          try {
            var res = await fetch("/api/admin/feishu/login?returnTo=" + encodeURIComponent("/"));
            var data = await res.json();
            if (!res.ok || !data || !data.url) {
              document.getElementById("loginFailDialog").querySelector("p").textContent = data.error || "登录失败";
              document.getElementById("loginFailDialog").showModal();
              return;
            }
            window.location.href = data.url;
          } catch (_) {
            document.getElementById("loginFailDialog").querySelector("p").textContent = "登录失败";
            document.getElementById("loginFailDialog").showModal();
          }
        }

        document.getElementById("bannerLoginBtn").addEventListener("click", beginLogin);
        document.getElementById("closeLoginFailBtn").addEventListener("click", function () {
          document.getElementById("loginFailDialog").close();
        });
      })();
    </script>
  </body>
</html>
