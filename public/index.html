<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>功能大厅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/hall.css" />
  </head>
  <body>
    <main class="hall-shell">
      <section class="hall-hero">
        <p class="eyebrow">CREATIVE TOOL HALL</p>
        <h1>功能大厅</h1>
        <p>
          选择要进入的工作流：先把想法整理成规范 Prompt，再进入生图工作台调用模型生成图片。
        </p>
      </section>

      <section class="tool-grid">
        <a class="tool-card" href="/image.html">
          <span class="tool-mark">IMG</span>
          <div>
            <p class="tool-kicker">IMAGE GENERATION</p>
            <h2>AI 生图工作台</h2>
            <p>上传参考图、填写 Prompt、选择模型和比例，生成图片并查看本机记录与管理员记录。</p>
          </div>
          <strong>进入生图</strong>
        </a>

        <a class="tool-card" href="/prompt.html">
          <span class="tool-mark">PRM</span>
          <div>
            <p class="tool-kicker">PROMPT ORCHESTRATOR</p>
            <h2>Prompt 优化器</h2>
            <p>根据 SKILL 规则，按“直接改图 / 参考图生图 / 纯文生图”输出规范 Prompt。</p>
          </div>
          <strong>进入优化器</strong>
        </a>
      </section>
    </main>
  </body>
</html>
